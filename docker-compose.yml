services:
  denon-remote:
    build: .
    container_name: denon-ceol-remote
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DENON_HOST=${DENON_HOST:-192.168.1.100}
      - PORT=3000
    # NOTE: SSDP auto-discovery and subnet scanning require host network mode.
    # Uncomment the next line to enable host networking so discovery can see your LAN:
    # network_mode: host
